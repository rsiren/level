<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e18">
<title>LevelUp Pulse</title>
<style>
  :root{--bg:#0a0e18;--border:rgba(255,255,255,.07);--text:#eef1f7;--muted:#8d97ad;--teal:#5fd4c4;--gold:#e8c476;--bad:#f4756b}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:linear-gradient(180deg,#0c1322 0%,#0a0e18 100%);min-height:100vh;color:var(--text);
    font:17px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:linear-gradient(170deg,#18213a 0%,#141c31 80%);border:1px solid var(--border);
    border-radius:22px;padding:28px 22px;max-width:420px;width:100%;box-shadow:0 18px 40px -22px rgba(0,0,0,.8)}
  h1{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px}
  .big{font-size:34px;font-weight:200;margin:6px 0 2px}
  .ok{color:var(--teal)} .err{color:var(--bad)}
  .muted{color:var(--muted);font-size:14px}
  .mit{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin-top:16px;font-size:15px}
  .mit b{display:block;font-size:12px;color:var(--teal);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
  .mit .small{font-size:12.5px;color:var(--muted)}
  input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);
    border-radius:14px;padding:13px 14px;font-size:15px;margin-top:10px;outline:none}
  button{width:100%;background:linear-gradient(135deg,#5fd4c4,#53b9d8);color:#08111d;border:none;
    border-radius:999px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px}
</style>
</head>
<body>
<div class="card" id="card"><h1>LevelUp · Pulse</h1><div id="out" class="muted">Working…</div></div>
<script>
/* Companion endpoint for Siri Shortcuts. Same origin as the app -> same localStorage container
   (in this browser). Reuses the app's storage keys and merge logic EXACTLY — v4 field groups. */
const KEY='levelup_ralf_v2', CFGKEY='levelup_cfg_v2', GFILE='levelup-data.json';
function blankDB(){return{v:2,days:{},deep:[]}}
function load(){try{return Object.assign(blankDB(),JSON.parse(localStorage.getItem(KEY))||{})}catch(e){return blankDB()}}
function save(){localStorage.setItem(KEY,JSON.stringify(DB))}
function loadCfg(){try{return JSON.parse(localStorage.getItem(CFGKEY))||{}}catch(e){return{}}}
let DB=load(), CFG=loadCfg();
const todayK=()=>new Date().toISOString().slice(0,10);
const GROUPS=[
  {ts:'morningTs',fields:['mood','energy','moodLabel','meds','sleepAids','morningTs']},
  {ts:'planTs',fields:['mit','trigger','obstacle','planTs']},
  {ts:'eveningTs',fields:['kept','note','eveningTs']}
];
function mergeDB(a,b){
  const out=blankDB();
  const keys=new Set([...Object.keys(a.days||{}),...Object.keys(b.days||{})]);
  keys.forEach(k=>{
    const ra=a.days[k]||{},rb=b.days[k]||{},m={};
    GROUPS.forEach(g=>{
      const ta=ra[g.ts]||0,tb=rb[g.ts]||0;
      const src=tb>ta?rb:ra;
      if(src[g.ts])g.fields.forEach(f=>{if(src[f]!==undefined)m[f]=src[f]});
    });
    if(Object.keys(m).length)out.days[k]=m;
  });
  const dmap={};
  [...(a.deep||[]),...(b.deep||[])].forEach(s=>{
    if(!dmap[s.date]||(s.ts||0)>(dmap[s.date].ts||0))dmap[s.date]=s;
  });
  out.deep=Object.values(dmap).sort((x,y)=>x.date<y.date?-1:1);
  return out;
}
const IFTHEN={
 "I'll start something more interesting instead":"write the interesting idea on a parking list and do 25 focused minutes on the commitment first.",
 "I'll tell myself I'll do it later":"start a 10-minute timer immediately — starting, not finishing, is the contract.",
 "It feels too big / I don't know where to start":"define the smallest shippable slice in one sentence and do only that.",
 "An impulse pulls me away (food, phone, markets, browsing)":"name the impulse out loud, put the phone in another room, and surf the urge for 90 seconds before deciding.",
 "Low energy / can't be bothered":"do a deliberately bad first version for 15 minutes — quality is tomorrow's problem.",
 "A rabbit hole: over-researching instead of doing":"close all tabs and produce output from what I already know for 25 minutes."
};
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
const out=document.getElementById('out');
function ghHeaders(){return{'Authorization':'Bearer '+CFG.token,'Accept':'application/vnd.github+json','Content-Type':'application/json'}}

function setupForm(){
  out.innerHTML=`<p class="muted">One-time setup for this browser. Same token + Gist ID as the app.</p>
    <input type="password" id="tok" placeholder="github_pat_…">
    <input type="text" id="gid" placeholder="Gist ID">
    <button onclick="saveSetup()">Save</button>`;
}
function saveSetup(){
  CFG.token=document.getElementById('tok').value.trim();
  CFG.gistId=document.getElementById('gid').value.trim();
  localStorage.setItem(CFGKEY,JSON.stringify(CFG));
  location.reload();
}
function mitCard(t){
  return t.mit?`<div class="mit"><b>Today's commitment</b>${esc(t.mit)}
    ${t.trigger?'<br><span class="small">Start: '+esc(t.trigger)+'</span>':''}
    ${t.obstacle?'<br><span class="small" style="color:var(--teal)">If '+esc(t.obstacle.toLowerCase())+' → I will '+esc(IFTHEN[t.obstacle]||'execute the plan.')+'</span>':''}</div>`
    :'<div class="mit"><b>Today\'s commitment</b>None set — tonight\'s review fixes that.</div>';
}
async function run(){
  if(!CFG.token||!CFG.gistId){setupForm();return}
  const p=new URLSearchParams(location.hash.slice(1));
  try{
    /* always pull + merge first so we never clobber other-device fields */
    const r=await fetch('https://api.github.com/gists/'+CFG.gistId,{headers:ghHeaders()});
    if(!r.ok)throw Error('fetch '+r.status);
    const j=await r.json();
    let remote=blankDB();
    try{remote=Object.assign(blankDB(),JSON.parse(j.files[GFILE].content))}catch(e){}
    DB=mergeDB(DB,remote);
    const k=todayK();
    if(!DB.days[k])DB.days[k]={};
    const t=DB.days[k];
    let wrote=false, headline='', sub='';

    if(p.get('med')){ /* append a med after the pulse */
      if(!t.morningTs){
        out.innerHTML=`<div class="big err">✗ Pulse first</div>
          <p class="muted">Meds ride on the morning pulse. Do the pulse, then log the med.</p>${mitCard(t)}`;
        save();return;
      }
      t.meds=[...new Set([...(t.meds||[]),p.get('med')])];
      t.morningTs=Date.now();
      wrote=true;headline='✓ Logged';sub='meds today: '+t.meds.join(', ');
    }
    else if(p.get('e')&&p.get('m')){ /* full pulse */
      const e=Math.min(3,Math.max(1,parseInt(p.get('e'),10)||0));
      const m=Math.min(5,Math.max(1,parseInt(p.get('m'),10)||0));
      if(!e||!m)throw Error('bad energy/mood values');
      t.energy=e;t.mood=m;
      t.moodLabel=p.get('label')||'';
      t.meds=(p.get('meds')||'').split(',').map(s=>s.trim()).filter(x=>x&&x!=='none');
      t.sleepAids=(p.get('aids')||'').split(',').map(s=>s.trim()).filter(x=>x&&x!=='none');
      t.morningTs=Date.now();
      wrote=true;headline='✓ Pulse logged';
      sub='energy '+e+'/3 · mood '+m+'/5'
        +(t.meds.length?' · meds: '+t.meds.join(', '):'')
        +(t.sleepAids.length?' · sleep aid: '+t.sleepAids.join(', '):'');
    }
    save();
    if(wrote){
      const push=await fetch('https://api.github.com/gists/'+CFG.gistId,{method:'PATCH',headers:ghHeaders(),
        body:JSON.stringify({files:{[GFILE]:{content:JSON.stringify(DB)}}})});
      if(!push.ok)throw Error('push '+push.status);
      out.innerHTML=`<div class="big ok">${headline}</div><p class="muted">${esc(sub)}</p>${mitCard(t)}`;
    }else{
      out.innerHTML=`<div class="big">Status</div>
        <p class="muted">${t.morningTs?'Pulse done — energy '+t.energy+'/3, mood '+t.mood+'/5':'Pulse still open'}</p>${mitCard(t)}`;
    }
  }catch(err){
    out.innerHTML=`<div class="big err">✗ Sync failed</div>
      <p class="muted">${esc(err.message)}. Saved locally is NOT guaranteed across browsers — open the app and check.
      401 = token expired/revoked · 404 = wrong Gist ID.</p>`;
  }
}
run();
</script>
</body>
</html>
